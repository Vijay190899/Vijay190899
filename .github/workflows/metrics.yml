name: Generate metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      # Full-year contribution calendar, graphic only.
      - name: Contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Vijay190899
          filename: metrics-calendar.svg
          committer_branch: metrics
          config_timezone: Europe/Berlin
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # Language breakdown, colored bars.
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Vijay190899
          filename: metrics-languages.svg
          committer_branch: metrics
          config_timezone: Europe/Berlin
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

      # Achievement badges, compact graphic row.
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: Vijay190899
          filename: metrics-achievements.svg
          committer_branch: metrics
          config_timezone: Europe/Berlin
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
