name: Generate profile cards

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  cards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SVG cards
        run: python scripts/gen_cards.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to metrics branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: metrics
          build_dir: cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
